<!DOCTYPE html>
<html lang="pt-br" class="notranslate" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="google" content="notranslate" />
  <title>Vesco — App Motorista</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 32 32' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M16 3L3 10V22L16 29L29 22V10L16 3Z' fill='%230f172a' stroke='%233b82f6' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M16 16L3 10M16 16L29 10M16 16V29' stroke='%233b82f6' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M9 13L16 19.5L23 13' stroke='%2360a5fa' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <style>
    :root { --bg:#f8fafc; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --blue:#004f9f; --green:#059669; --red:#dc2626; --amber:#f59e0b; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
    .top { position:sticky; top:0; z-index:10; background:#0f172a; color:white; padding:14px 16px; box-shadow:0 4px 12px rgba(0,0,0,.12); }
    .top-row { display:flex; align-items:center; justify-content:space-between; gap:12px; max-width:980px; margin:0 auto; }
    .brand { display:flex; align-items:center; gap:10px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
    .brand svg { width:32px; height:32px; flex:0 0 32px; }
    .brand small { display:block; color:#93c5fd; font-size:10px; letter-spacing:.18em; margin-top:-2px; }
    .pill { background:#1e293b; color:#bfdbfe; border:1px solid #334155; border-radius:999px; padding:8px 12px; font-size:12px; font-weight:800; white-space:nowrap; }
    main { width:min(980px, 100%); margin:0 auto; padding:16px; }
    .card { background:white; border:1px solid var(--line); border-radius:18px; box-shadow:0 8px 24px rgba(15,23,42,.05); padding:16px; margin-bottom:14px; }
    .route-title { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; flex-wrap:wrap; }
    h1 { margin:0; font-size:20px; line-height:1.2; }
    .sub { color:var(--muted); font-size:13px; font-weight:700; margin-top:6px; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
    .stat { background:#f1f5f9; border:1px solid #e2e8f0; border-radius:14px; padding:10px; text-align:center; }
    .stat b { display:block; font-size:18px; }
    .stat span { color:var(--muted); font-size:11px; font-weight:800; text-transform:uppercase; }
    .order { border:1px solid var(--line); border-radius:16px; background:white; overflow:hidden; margin-bottom:14px; }
    .order-head { padding:14px; background:#f8fafc; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .order-num { font-weight:950; font-size:18px; color:#0f172a; }
    .badge { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:6px 10px; font-size:11px; font-weight:900; text-transform:uppercase; border:1px solid #bfdbfe; background:#eff6ff; color:#1d4ed8; white-space:nowrap; }
    .badge.ok { border-color:#bbf7d0; background:#f0fdf4; color:#15803d; }
    .order-body { padding:14px; display:grid; gap:10px; }
    .label { color:#64748b; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.04em; }
    .value { font-weight:800; font-size:14px; color:#0f172a; }
    .address { color:#334155; line-height:1.35; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
    button, input, textarea, select { font:inherit; }
    .btn { border:0; border-radius:12px; padding:11px 14px; font-weight:950; cursor:pointer; display:inline-flex; justify-content:center; align-items:center; gap:8px; text-decoration:none; }
    .btn-blue { background:#2563eb; color:white; }
    .btn-green { background:#059669; color:white; }
    .btn-light { background:#f1f5f9; color:#0f172a; border:1px solid #e2e8f0; }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    .form { display:none; border-top:1px solid var(--line); background:#f8fafc; padding:14px; }
    .form.open { display:block; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .field { display:flex; flex-direction:column; gap:5px; }
    input, textarea, select { width:100%; border:1px solid #cbd5e1; border-radius:12px; padding:12px; background:white; outline:none; font-weight:750; }
    input:focus, textarea:focus, select:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    textarea { min-height:74px; resize:vertical; }
    .empty, .error { text-align:center; padding:28px 16px; color:#64748b; font-weight:850; }
    .error { color:#991b1b; background:#fef2f2; border:1px solid #fecaca; border-radius:16px; }
    .loading { display:flex; align-items:center; justify-content:center; gap:12px; padding:28px; font-weight:900; color:#334155; }
    .spin { width:22px; height:22px; border:3px solid #bfdbfe; border-top-color:#2563eb; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .toast { position:fixed; left:16px; right:16px; bottom:16px; z-index:99; background:#0f172a; color:white; padding:14px 16px; border-radius:14px; box-shadow:0 12px 28px rgba(0,0,0,.22); font-weight:900; display:none; }
    .toast.show { display:block; }
    @media (max-width:640px) {
      .top { padding:12px; } .top-row { align-items:flex-start; } .brand { font-size:13px; } .pill { font-size:11px; padding:7px 9px; }
      main { padding:12px; } h1 { font-size:17px; } .stats { grid-template-columns:1fr 1fr; } .grid { grid-template-columns:1fr; }
      .order-head { align-items:flex-start; } .actions .btn, .form .btn { width:100%; } .order-num { font-size:16px; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="top-row">
      <div class="brand">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 3L3 10V22L16 29L29 22V10L16 3Z" fill="#0f172a" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/><path d="M16 16L3 10M16 16L29 10M16 16V29" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 13L16 19.5L23 13" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div>Vesco<small>Motorista</small></div>
      </div>
      <div class="pill" id="statusPill">Carregando</div>
    </div>
  </header>
  <main>
    <section class="card" id="routeCard">
      <div class="loading"><span class="spin"></span> Carregando rota...</div>
    </section>
    <section id="ordersList"></section>
  </main>
  <div class="toast" id="toast"></div>
  <script>window.VESCO_API_URL = window.VESCO_API_URL || 'https://script.google.com/macros/s/AKfycbxEzbxBABMDwi7B7tn_1p-lC0vc50JjHFOrH3w42Oog2-5R2-WMYSrQ27ED7wduJUN6/exec';</script>
  <script src="./motorista.js"></script>
</body>
</html>
